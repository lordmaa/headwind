<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Headwind — Connect</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh;">
  <div style="text-align:center; max-width:400px; padding:2rem;">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="" style="width:80px; height:80px; border-radius:20px; margin-bottom:1rem;">
    <h1 style="font-size:1.75rem; font-weight:700; margin-bottom:0.5rem;">Headwind</h1>
    <p style="color:var(--text-muted); margin-bottom:2rem; line-height:1.6;">
      Your self-hosted, private cycling analytics database. Connect Strava to get started.
    </p>
    <a href="{{ url_for('auth.strava') }}" class="btn btn-strava" style="font-size:1rem; padding:0.75rem 1.75rem;">
      Connect with Strava
    </a>
  </div>
</body>
</html>
