<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BikeTracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); }
    .login-card { width:100%; max-width:380px; padding:2rem; }
    .login-logo { font-size:1.5rem; font-weight:700; color:var(--accent); margin-bottom:0.25rem; }
    .login-sub  { font-size:0.875rem; color:var(--text-muted); margin-bottom:2rem; }
    .login-error { background:rgba(239,68,68,0.12); border:1px solid rgba(239,68,68,0.3);
                   color:#ef4444; padding:0.625rem 0.875rem; border-radius:8px;
                   font-size:0.875rem; margin-bottom:1rem; }
  </style>
</head>
<body>
  <div class="card login-card">
    <div class="login-logo">🚴 BikeTracker</div>
    <div class="login-sub">Sign in to continue</div>

    {% if error %}
      <div class="login-error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" autofocus autocomplete="username" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:0.5rem;">Sign in</button>
    </form>
  </div>
</body>
</html>
