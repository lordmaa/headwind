services:
  app:
    image: lordmerchant99/bike-flask:latest
    ports:
      - "5001:5001"
    volumes:
      - db_data:/data
      - garmin_tokens:/app/.garmin_tokens
    env_file:
      - path: .env
        required: false
    environment:
      - DATABASE_URL=/data/bike.db
    restart: unless-stopped

volumes:
  db_data:
  garmin_tokens:
