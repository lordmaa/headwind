services:
  app:
    image: lordmerchant99/bike-flask:latest
    ports:
      - "5001:5001"
    volumes:
      - db_data:/data
      - garmin_tokens:/app/.garmin_tokens
    environment:
      - DATABASE_URL=/data/bike.db
      - SECRET_KEY=change-me-please
      - APP_USERNAME=admin
      - APP_PASSWORD=changeme
      - APP_URL=http://localhost:5001
      - STRAVA_CLIENT_ID=
      - STRAVA_CLIENT_SECRET=
      - STRAVA_WEBHOOK_TOKEN=changeme
      - OPENAI_API_KEY=
    restart: unless-stopped

volumes:
  db_data:
  garmin_tokens:
